<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Banner Funcionamento</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Outfit', sans-serif;}
        
        .banner-func {
            width: 1920px;
            height: 450px;
            background-image: url('file:///C:/Users/g010792832/.gemini/antigravity-ide/brain/a2b540f0-b671-4032-b3fc-ac917dd461ad/bg_funcionamento_animaz_1781399354935.png');

            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 120px;
            box-sizing: border-box;
        }

        .gradient-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 20%, rgba(26, 11, 46, 0.9) 45%, rgba(26, 11, 46, 1) 100%);
            z-index: 1;
        }

        .func-left {
            z-index: 2;
            width: 700px;
            margin-left: 250px;
        }

        .func-logo {
            height: 55px;
            margin-bottom: 25px;
        }

        .func-top-text {
            color: #d1c8eb;
            font-size: 26px;
            font-weight: 600;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
        }

        .func-main-text {
            color: #fff;
            font-size: 72px;
            font-weight: 900;
            margin: 0 0 25px 0;
            line-height: 1;
            letter-spacing: -2px;
        }
        .func-main-text span {
            color: #B8E62E;
        }

        .func-wpp {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(184, 230, 46, 0.1);
            padding: 12px 25px;
            border-radius: 50px;
            width: fit-content;
            border: 1px solid rgba(184, 230, 46, 0.3);
        }
        
        .func-wpp-text {
            color: #fff;
            font-size: 32px;
            font-weight: 800;
        }
        .func-wpp-text span {
            color: #B8E62E;
            font-size: 24px;
            font-weight: 600;
        }

        .func-right {
            z-index: 2;
            display: flex;
            gap: 30px;
            background: rgba(255,255,255,0.04);
            padding: 35px 50px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .unit {
            display: flex;
            flex-direction: column;
            border-left: 3px solid #B8E62E;
            padding-left: 20px;
        }
        
        .unit-title {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 5px 0;
            letter-spacing: 0.5px;
        }
        
        .unit-time {
            color: #b0a3d4;
            font-size: 22px;
            font-weight: 600;
            margin: 0;
        }
    </style>
</head>

</html>
