<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Banners Animaz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body { margin: 0; padding: 0; display: flex; flex-direction: column; gap: 50px; background: #000; font-family: 'Inter', sans-serif; align-items: center; justify-content: center; min-height: 100vh;}
        
        /* === BANNER ARRAIAL === */
        .banner-arraial {
            width: 1920px;
            height: 450px;
            background-color: #381559; /* Roxo vibrante junino */
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .arraial-bg {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            z-index: 1;
        }

        .arraial-content {
            position: relative;
            z-index: 2;
            padding-left: 120px;
            width: 1000px;
        }

        .arraial-logo {
            width: 160px;
            margin-bottom: 25px;
        }

        .arraial-tag {
            background: #B8E62E; /* Verde marca */
            color: #1a0b2e;
            font-size: 20px;
            font-weight: 900;
            padding: 8px 20px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .arraial-title {
            font-size: 72px;
            font-weight: 900;
            color: #fff;
            margin: 0 0 15px 0;
            line-height: 1.1;
            letter-spacing: -2px;
        }
        .arraial-title span {
            color: #B8E62E;
        }

        .arraial-subtitle {
            font-size: 28px;
            color: #e2e0ea;
            margin: 0 0 40px 0;
            font-weight: 600;
        }

        .arraial-features {
            display: flex;
            gap: 30px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            color: #fff;
            font-weight: 800;
        }
        .feature-item svg {
            color: #B8E62E;
        }


        /* === BANNER FUNCIONAMENTO === */
        .banner-func {
            width: 1920px;
            height: 450px;
            background-color: #1a0b2e; /* Roxo profundo marca */
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 120px;
            box-sizing: border-box;
        }

        .func-left {
            z-index: 2;
            width: 800px;
        }

        .func-logo {
            width: 180px;
            margin-bottom: 30px;
        }

        .func-top-text {
            color: #B8E62E;
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 5px 0;
        }

        .func-main-text {
            color: #fff;
            font-size: 85px;
            font-weight: 900;
            margin: 0 0 30px 0;
            line-height: 1;
            letter-spacing: -3px;
        }

        .func-wpp {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .func-wpp-text {
            color: #fff;
            font-size: 42px;
            font-weight: 900;
        }
        .func-wpp-text span {
            color: #887aab;
            font-size: 28px;
            font-weight: 600;
        }

        .func-right {
            z-index: 2;
            display: flex;
            gap: 40px;
            background: rgba(255,255,255,0.03);
            padding: 40px 60px;
            border-radius: 30px;
            border: 2px solid rgba(184, 230, 46, 0.3);
        }

        .unit {
            display: flex;
            flex-direction: column;
        }
        
        .unit-title {
            color: #B8E62E;
            font-size: 26px;
            font-weight: 900;
            margin: 0 0 5px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .unit-time {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            padding-left: 36px;
        }

        /* Abstract shapes */
        .shape1 { position: absolute; width: 600px; height: 600px; border-radius: 50%; border: 3px solid rgba(184, 230, 46, 0.1); top: -200px; left: -100px; }
        .shape2 { position: absolute; width: 800px; height: 800px; border-radius: 50%; border: 2px solid rgba(158, 113, 255, 0.1); bottom: -400px; right: 200px; }
        
    </style>
</head>
<body>

    <!-- BANNER ARRAIAL HTML -->
    <div class="banner-arraial" id="banner-arraial">
        <img src="file:///C:/Users/g010792832/Desktop/Animaz%20Glassdoor/assets/logo_transparent_wpf.png" class="arraial-logo" style="position:absolute; top: 50px; left: 120px; z-index: 10;">

                <div class="func-wpp-text">
                    <span>+55 (92)</span> 98187-0014

        <div class="func-right">

    </div>

</body>
</html>
